spring.application.name=face2hire-backend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}

# TLS configuration (this will fix your error)
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Optional but recommended for debugging
spring.mail.properties.mail.debug=false

#spring.config.import=optional:file:.env.properties

app.frontend-url=${APP_FRONTEND_URL}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email, profile
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BACKEND_URL}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-name=Google

# Google OAuth2 Provider Configuration
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub


#github OAuth2
spring.security.oauth2.client.registration.github.client-id=${OAUTH_GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${OAUTH_GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope= user:email, read:user
spring.security.oauth2.client.registration.github.redirect-uri=${APP_BACKEND_URL}/login/oauth2/code/github
spring.security.oauth2.client.registration.github.client-name=Github

spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user
spring.security.oauth2.client.provider.github.user-name-attribute=id


aws.s3.bucket=${AWS_S3_BUCKET_NAME}

aws.region=${AWS_S3_REGION}
aws.access-key-id=${AWS_S3_ACCESS_KEY_ID}
aws.secret-access-key=${AWS_S3_SECRET_ACCESS_KEY}


# Log level
#logging.level.root=INFO
#logging.level.com.aiinterview.face2hire_backend=DEBUG

#logging.level.org.springframework.web.cors=DEBUG
#logging.level.org.springframework.security=DEBUG

# Log file location
logging.file.name=logs/ai-interview-app.log

# Max file size before rotation
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10

openai.api.key=${OPENAI_API_KEY}


openai.whisper.model=whisper-1
openai.gpt.model=gpt-4o-mini
openai.tts.model=tts-1

# S3 for audio (reuse existing bucket)
aws.s3.region=${AWS_S3_REGION}
interview.audio.presigned.url.expiry.minutes=15

# OTP Configuration
otp.expiry.seconds=180
otp.max.requests.per.hour=3
otp.block.duration.minutes=15
otp.max.failed.attempts=3
otp.failed.attempts.window.minutes=5
otp.cleanup.interval.seconds=30
otp.max.cache.size=10000

sendgrid.api.key=${SENDGRID_API_KEY}