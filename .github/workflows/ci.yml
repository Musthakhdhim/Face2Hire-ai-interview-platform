name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # MySQL service for backend tests
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: SYSTEM
          MYSQL_DATABASE: aiinterview
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- Backend (interviewai) ----------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('interviewai/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and test backend
        run: |
          cd face2hire-backend
          mvn clean verify -e -X
        env:
          # These environment variables are picked up by application.properties
          DB_URL: jdbc:mysql://localhost:3306/aiinterview?createDatabaseIfNotExist=true
          DB_USERNAME: root
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EMAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          APP_FRONTEND_URL: http://localhost:5173
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          AWS_S3_REGION: ${{ secrets.AWS_S3_REGION }}
          AWS_S3_ACCESS_KEY_ID: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          AWS_S3_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}

      - name: Upload test reports
        if: always()  # Upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: face2hire-backend/target/surefire-reports/
      # ---------- Frontend (interview-ai) ----------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # instead of '21'

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('interview-ai/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Create .env file for frontend
        run: |
          cd Face2Hire-frontend
          echo "VITE_API_BASE_URL=http://localhost:8080/api/v1" > .env

      - name: Install frontend dependencies
        run: |
          cd Face2Hire-frontend
          npm ci

      - name: Run frontend tests (if script exists)
        run: |
          cd Face2Hire-frontend
          if npm run | grep -q " test"; then
            npm test -- --watchAll=false --passWithNoTests
          else
            echo "No test script found – skipping tests"
          fi

      - name: Build frontend
        run: |
          cd Face2Hire-frontend
          npm run build